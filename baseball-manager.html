<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pennant Chase</title>
<style>
:root{--bg:#0c1118;--surface:#151d28;--card:#1a2433;--border:#2a3544;--text:#e8eef5;--muted:#94a3b8;--accent:#3b82f6;--accent-dim:#2563eb;--success:#22c55e;--danger:#ef4444;--radius:10px;--sidebar:240px}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:stretch}
#onboarding{flex:1;width:100%;min-width:0;display:flex;flex-direction:column}
#app{display:flex;width:100%;min-height:100vh;flex:1}
.sidebar{width:var(--sidebar);background:linear-gradient(180deg,#0f172a 0%,#0c1118 100%);border-right:1px solid var(--border);padding:1.25rem 0;position:fixed;left:0;top:0;bottom:0;z-index:100;overflow-y:auto}
.sidebar h1{font-size:1rem;font-weight:700;margin:0 1rem 1.25rem;padding-bottom:1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.5rem}
.sidebar h1 .ball{width:28px;height:28px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#fff,#c41e3a 45%,#fff 46%,#c41e3a 48%);flex-shrink:0}
.nav-item{display:flex;align-items:center;gap:.65rem;padding:.55rem 1.25rem;color:var(--muted);cursor:pointer;font-size:.875rem;transition:background .15s,color .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(59,130,246,.08);color:var(--text)}
.nav-item.active{color:#fff;background:rgba(59,130,246,.12);border-left-color:var(--accent)}
.nav-item .ico{font-size:1rem;width:1.25rem;text-align:center}
.main{margin-left:var(--sidebar);flex:1;padding:1.5rem 2rem;min-width:0}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.panel h2{margin:0 0 1rem;font-size:1.1rem;font-weight:600}
.row{display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-start}
.btn{background:var(--accent);color:#fff;border:none;padding:.5rem 1rem;border-radius:8px;font-size:.875rem;cursor:pointer;font-weight:500}
.btn:hover{background:var(--accent-dim)}
.btn.secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn.secondary:hover{background:var(--border)}
.btn.danger{background:var(--danger)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn:focus-visible,.nav-item:focus-visible,input:focus-visible,select:focus-visible,button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
table{width:100%;border-collapse:collapse;font-size:.8125rem}
th,td{padding:.5rem .65rem;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none}
th:hover{color:var(--text)}
tr:hover td{background:rgba(255,255,255,.02)}
.badge{display:inline-block;padding:.15rem .45rem;border-radius:4px;font-size:.7rem;font-weight:600;background:var(--surface);color:var(--muted)}
.badge.mlb{background:rgba(59,130,246,.2);color:#93c5fd}
.badge.aaa{background:rgba(168,85,247,.2);color:#d8b4fe}
.badge.aa{background:rgba(34,197,94,.15);color:#86efac}
.badge.a{background:rgba(251,191,36,.15);color:#fcd34d}
.grid-2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.stat-big{font-size:2rem;font-weight:700;color:var(--accent)}
.sub{color:var(--muted);font-size:.8rem;margin-top:.25rem}
.tabs{display:flex;gap:.25rem;margin-bottom:1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.tab{padding:.5rem 1rem;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-size:.875rem}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:600}
input,select{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:.45rem .65rem;border-radius:6px;font-size:.875rem}
input[type="number"]{width:5rem}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.65);display:none;align-items:center;justify-content:center;z-index:200;padding:1rem}
.modal-bg.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);max-width:480px;width:100%;padding:1.5rem;max-height:90vh;overflow-y:auto}
.modal h3{margin-top:0}
.news-item{padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.85rem}
.news-item:last-child{border-bottom:none}
.bracket{display:flex;gap:1rem;flex-wrap:wrap;font-size:.8rem}
.bracket .col{display:flex;flex-direction:column;gap:.35rem;min-width:140px}
.bracket .match{background:var(--surface);padding:.4rem .6rem;border-radius:6px;border:1px solid var(--border)}
.empty{color:var(--muted);padding:2rem;text-align:center}
:root{--gold:#d4a853;--gold-dim:#b8923f;--info:#4a9eff}
body{background:radial-gradient(ellipse 120% 80% at 20% -20%,rgba(212,168,83,.08),transparent 50%),radial-gradient(ellipse 80% 60% at 100% 20%,rgba(74,158,255,.06),transparent 45%),var(--bg)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#app{animation:fadeIn .35s ease}
.hidden{display:none!important}
.brand{padding:1.25rem 1rem 1rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:.65rem}
.brand-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#8b6914);clip-path:polygon(0 0,100% 0,85% 100%,0 85%);box-shadow:0 0 20px rgba(212,168,83,.25)}
.brand-text{font-size:1.05rem;font-weight:800;background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.team-banner{margin:.85rem 1rem;padding:.65rem .85rem;border-radius:10px;background:rgba(26,36,51,.85);border:1px solid rgba(212,168,83,.15);font-size:.75rem}
.team-banner strong{display:block;color:var(--gold);font-weight:700}
.nav-section{margin-top:1rem}
.nav-section-label{font-size:.62rem;font-weight:700;letter-spacing:.12em;color:var(--muted);padding:.35rem 1.25rem}
.nav-item{display:flex;align-items:center;gap:.6rem;padding:.5rem 1rem;margin:1px .75rem;border-radius:10px;border-left:none;color:var(--muted);cursor:pointer;font-size:.8125rem;width:calc(100% - 1.5rem);background:transparent;border-right:none;border-top:none;border-bottom:none;font-family:inherit;text-align:left}
.nav-item:hover{background:rgba(212,168,83,.08);color:var(--text)}
.nav-item.active{color:var(--text);background:rgba(212,168,83,.14);box-shadow:inset 0 0 0 1px rgba(212,168,83,.2)}
.nav-item .ico{width:1.2rem;display:flex;align-items:center;justify-content:center;color:var(--gold)}
.sidebar{background:linear-gradient(180deg,rgba(15,22,34,.98),rgba(10,14,22,.99));padding-bottom:1rem;display:flex;flex-direction:column}
.sidebar-search{margin:.5rem 1rem 0}
.sidebar-search input{width:100%;padding:.5rem;border-radius:10px;border:1px solid var(--border);background:rgba(18,26,38,.8);color:var(--text);font-size:.78rem}
.panel{backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 32px rgba(0,0,0,.35)}
.btn{background:linear-gradient(180deg,var(--gold),var(--gold-dim));color:#0a0e14;font-weight:600;border:none}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(212,168,83,.25)}
.btn.secondary{background:rgba(22,32,48,.9);color:var(--text);border:1px solid var(--border)}
.btn.lg{padding:.75rem 1.35rem;font-size:1rem}
.btn.sm{padding:.25rem .55rem;font-size:.72rem}
thead th{background:rgba(15,22,34,.95);backdrop-filter:blur(8px)}
tbody tr:nth-child(even){background:rgba(255,255,255,.025)}
tr:hover td{background:rgba(212,168,83,.06)}
tr.user-highlight td{background:rgba(212,168,83,.12)!important}
tr.postseason-spot td{border-left:4px solid var(--gold);box-shadow:inset 4px 0 0 rgba(212,168,83,.35)}
tr.record-pos td{background:rgba(52,211,153,.08)!important}
tr.record-neg td{background:rgba(248,113,113,.08)!important}
.standings-overview-table{font-size:.88rem}
.standings-overview-table th,.standings-overview-table td{padding:.55rem .7rem}
.standings-div-hdr{font-size:1rem;font-weight:800;color:var(--gold);margin:1.1rem 1rem .55rem;letter-spacing:.04em}
.cal-today-banner{font-size:1rem;font-weight:800;color:var(--gold);margin:0 0 .65rem;padding:.55rem .75rem;border-radius:10px;background:rgba(212,168,83,.12);border:1px solid rgba(212,168,83,.35)}
.cal-record-line{font-size:.85rem;color:var(--muted);margin:0 0 .55rem}
.news-search{width:100%;max-width:280px;margin-bottom:.75rem;font-size:.82rem}
.settings-section{margin-bottom:1.25rem;padding:1rem 1.1rem;border-radius:12px;border:1px solid var(--border);background:rgba(15,22,34,.45)}
.settings-section h3{margin:0 0 .65rem;font-size:.88rem;font-weight:800;letter-spacing:.06em;color:var(--gold);text-transform:uppercase}
.settings-row{display:flex;flex-wrap:wrap;gap:.75rem;align-items:center;margin:.5rem 0}
.toggle-like{display:inline-flex;align-items:center;gap:.5rem;cursor:pointer;font-size:.85rem}
.prospect-statbar{display:flex;flex-wrap:wrap;gap:.65rem;margin-top:.45rem;font-size:.78rem;color:var(--muted)}
.prospect-statbar strong{color:var(--text)}
.prospect-scout{color:var(--muted);font-size:.8rem;font-style:italic;margin-top:.35rem;line-height:1.4}
.prosp-table-wide{font-size:.82rem}
.prosp-table-wide th,.prosp-table-wide td{padding:.5rem .55rem}
.stat-big{color:var(--gold);font-variant-numeric:tabular-nums;font-weight:800}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.badge{border-radius:999px}
.modal-bg{backdrop-filter:blur(6px)}
.toast-wrap{position:fixed;right:1rem;bottom:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:360px;pointer-events:none}
.toast{pointer-events:auto;padding:.85rem 1rem;border-radius:12px;font-size:.84rem;background:rgba(22,34,52,.95);border:1px solid var(--border);animation:fadeIn .3s ease;position:relative;overflow:hidden}
.toast.success{border-color:rgba(52,211,153,.4)}.toast.err{border-color:rgba(248,113,113,.45)}.toast.info{border-color:rgba(74,158,255,.35)}
.toast-bar{position:absolute;bottom:0;left:0;height:3px;opacity:.6;animation:toastProg 4s linear forwards;width:100%}
@keyframes toastProg{to{width:0}}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1rem}
.dash-hero{grid-column:1/-1;background:linear-gradient(135deg,rgba(212,168,83,.1),rgba(22,34,52,.5));border:1px solid rgba(212,168,83,.2)!important}
.progress-track{height:10px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:.65rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold-dim),var(--gold));border-radius:99px;width:0;transition:width .4s ease}
.results-strip{display:flex;flex-wrap:wrap;gap:.45rem;margin-top:.5rem}
.result-pill{padding:.3rem .65rem;border-radius:8px;font-size:.75rem;font-weight:600;font-variant-numeric:tabular-nums}
.result-pill.w{background:rgba(52,211,153,.15);color:#34d399}.result-pill.l{background:rgba(248,113,113,.12);color:#f87171}
.onboarding{min-height:100vh;padding:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,168,83,.12),transparent 50%),var(--bg)}
.onboarding-inner{max-width:1080px;margin:0 auto;padding:2rem 1rem;box-sizing:border-box;width:100%}
.onboarding-flow{max-width:none;width:100%;margin:0;padding:2rem clamp(1rem,4vw,3rem) 3rem;box-sizing:border-box;min-height:100vh;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(212,168,83,.1),transparent 45%),var(--bg)}
.onboarding-inner.splash-hero{max-width:none;width:100%;padding:0}
.pennant-logo{width:72px;height:72px;margin:0 auto 1rem;background:linear-gradient(135deg,var(--gold),#5c4a12);clip-path:polygon(0 0,100% 0,88% 100%,0 88%)}
.team-picker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:.6rem;margin-top:1rem}
.team-card{border:2px solid var(--border);border-radius:12px;padding:.8rem;cursor:pointer;background:rgba(26,36,51,.75);text-align:left}
.team-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.25)}
.team-card.selected{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,168,83,.12)}
.team-card .abbr{font-weight:800;color:var(--gold)}.team-card .full{font-size:.72rem;color:var(--muted);margin-top:.2rem}
.diff-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:1rem;margin-top:1rem}
.diff-card{border:2px solid var(--border);border-radius:12px;padding:1rem;cursor:pointer;background:rgba(26,36,51,.75)}
.diff-card.selected{border-color:var(--gold)}
.pot-bar{height:6px;border-radius:99px;background:rgba(255,255,255,.1);display:inline-block;min-width:50px;vertical-align:middle;overflow:hidden}
.pot-bar>i{display:block;height:100%;background:linear-gradient(90deg,#ef4444,#f97316,#eab308,#22c55e)}
.collapse-h{width:100%;padding:.6rem .85rem;margin-top:.5rem;border-radius:10px;border:1px solid var(--border);background:rgba(15,22,34,.6);color:var(--text);font-weight:600;cursor:pointer;font:inherit;text-align:left}
.collapse-b{display:none}.collapse-b.open{display:block}
.prospect-card{display:flex;gap:1.1rem;padding:1.15rem 1.25rem;border-radius:14px;border:1px solid var(--border);background:rgba(15,22,34,.45);margin-bottom:.85rem}
.prospect-card .rank{font-size:1.5rem;font-weight:900;color:var(--gold);min-width:1.75rem}
.fasttrack{font-size:.62rem;font-weight:700;color:var(--gold);letter-spacing:.06em}
.trade-meter{height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden;margin:.5rem 0}
.trade-meter>i{display:block;height:100%}
.meter-good{background:#34d399}.meter-mid{background:#eab308}.meter-bad{background:#f87171}
.trade-card{border:1px solid var(--border);border-radius:12px;padding:.65rem;margin:.35rem 0;background:rgba(15,22,34,.4)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;font-size:.7rem;margin-top:.65rem}
.cal-head{text-align:center;color:var(--muted);padding:.2rem}
.cal-cell{min-height:68px;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,.03);font-variant-numeric:tabular-nums;padding:5px 3px}
.cal-cell.has-game{border:1px solid var(--border);cursor:pointer}
.cal-cell.today{background:rgba(212,168,83,.22)!important;border:2px solid var(--gold)!important;box-shadow:0 0 12px rgba(212,168,83,.2);font-weight:700}
.cal-cell .dot{width:5px;height:5px;border-radius:50%;margin-top:2px}
.cal-cell .dot.w{background:#34d399}.cal-cell .dot.l{background:#f87171}
.cal-cell .opp{font-size:.72rem;color:var(--muted);max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 2px}
.cal-cell .dm{font-size:.74rem;color:var(--gold);font-weight:700}
.cal-wrap{margin-top:.5rem}
.cal-nav{display:flex;align-items:center;justify-content:space-between;gap:.75rem;margin-bottom:.75rem;flex-wrap:wrap}
.cal-month{font-size:1rem;font-weight:700;color:var(--text)}
.splash-hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2.5rem 1.25rem 3rem;background:linear-gradient(165deg,rgba(10,14,22,.97) 0%,rgba(15,22,36,.98) 45%,rgba(8,12,20,1) 100%),radial-gradient(ellipse 100% 80% at 50% -30%,rgba(212,168,83,.18),transparent 55%),radial-gradient(ellipse 70% 50% at 100% 100%,rgba(74,158,255,.08),transparent 45%);position:relative;overflow:hidden}
.splash-hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(212,168,83,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(212,168,83,.04) 1px,transparent 1px);background-size:48px 48px;opacity:.35;pointer-events:none}
.splash-inner{position:relative;z-index:1;text-align:center;max-width:720px}
.splash-kicker{font-size:.72rem;font-weight:700;letter-spacing:.2em;color:var(--gold);text-transform:uppercase;margin:0 0 1rem}
.splash-title{font-size:clamp(2.2rem,6vw,3.35rem);font-weight:900;margin:0 0 .85rem;line-height:1.08;background:linear-gradient(135deg,#fff 15%,var(--gold) 55%,#fde68a 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.splash-lead{color:var(--muted);font-size:1.05rem;line-height:1.65;margin:0 auto 2rem;max-width:32rem}
.splash-actions{display:flex;flex-wrap:wrap;gap:.75rem;justify-content:center;margin-bottom:2.5rem}
.splash-features{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;max-width:640px}
.splash-chip{font-size:.78rem;padding:.45rem .85rem;border-radius:999px;background:rgba(22,34,52,.75);border:1px solid rgba(212,168,83,.2);color:var(--text)}
.standings-board{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.25rem}
.standings-card{background:linear-gradient(180deg,rgba(22,32,48,.5),rgba(15,22,34,.35));border:1px solid var(--border);border-radius:14px;padding:1rem 0 0;overflow:hidden}
.standings-card h3{margin:0 1rem .65rem;font-size:.95rem;font-weight:700;color:var(--gold)}
.standings-card table{font-size:.8rem}
.standings-card th{padding:.55rem .65rem}
.standings-card td{padding:.45rem .65rem}
.standings-meta{color:var(--muted);font-size:.8rem;margin-bottom:1rem;padding:0 1.25rem;line-height:1.5}
.po-bracket{display:flex;flex-wrap:wrap;gap:1.25rem;margin:1rem 0}
.po-col{flex:1;min-width:240px;background:rgba(15,22,34,.45);border:1px solid var(--border);border-radius:12px;padding:1rem}
.po-col h4{margin:0 0 .75rem;font-size:.8rem;font-weight:700;color:var(--gold);letter-spacing:.06em}
.po-seed{display:flex;align-items:center;gap:.5rem;padding:.35rem .55rem;border-radius:8px;margin-bottom:4px;font-size:.8rem;font-variant-numeric:tabular-nums}
.po-seed .n{opacity:.55;width:1.25rem;font-weight:700}
.po-seed.user{background:rgba(212,168,83,.12);outline:1px solid rgba(212,168,83,.25)}
.po-active{background:rgba(74,158,255,.1);border:1px solid rgba(74,158,255,.25);border-radius:12px;padding:1rem;margin:1rem 0}
.po-cal-note{font-size:.85rem;color:var(--muted);margin-top:.75rem}
.bracket-shelf{display:grid;grid-template-columns:1fr minmax(200px,280px) 1fr;gap:1rem 1.25rem;align-items:stretch;margin:1rem 0;overflow-x:auto;padding-bottom:.5rem}
@media(max-width:1100px){.bracket-shelf{grid-template-columns:1fr;}}
.bracket-half{display:flex;flex-direction:row;gap:.75rem;align-items:stretch;min-height:220px}
.bracket-half.nl{flex-direction:row-reverse;justify-content:flex-end}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;gap:.75rem;flex:1;min-width:148px}
.bracket-round h5{margin:0 0 .35rem;font-size:.65rem;font-weight:800;letter-spacing:.08em;color:var(--muted);text-transform:uppercase}
.bracket-slot{border:1px solid var(--border);border-radius:10px;padding:.45rem .55rem;background:rgba(15,22,34,.55);font-size:.78rem}
.bracket-slot.tbd{opacity:.75;border-style:dashed}
.bracket-slot .row{display:flex;justify-content:space-between;align-items:center;gap:.35rem;padding:.2rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.bracket-slot .row:last-child{border-bottom:none}
.bracket-slot .row.won .abbr{color:var(--gold);font-weight:800}
.bracket-slot .row.lost .abbr{opacity:.55}
.bracket-slot .row .scr{font-variant-numeric:tabular-nums;font-size:.72rem;opacity:.85;min-width:2rem}
.bracket-ws{display:flex;flex-direction:column;justify-content:center;gap:.75rem}
.bracket-ws .bracket-round{min-width:0}
.bracket-ws h5{text-align:center}
.br-preview-note{font-size:.8rem;color:var(--muted);margin-top:.75rem}
.player-detail{margin:.5rem 0;padding:1rem;border-radius:12px;border:1px solid var(--border);background:rgba(15,22,34,.5);font-size:.78rem}
.move-row{display:flex;flex-wrap:wrap;gap:.35rem;align-items:center;margin-top:.35rem}
.badge.grade-a{background:rgba(52,211,153,.2);color:#a7f3d0}
.badge.grade-b{background:rgba(74,158,255,.18);color:#93c5fd}
.badge.grade-c{background:rgba(251,191,36,.18);color:#fde68a}
@media(max-width:900px){:root{--sidebar:58px}.brand-text,.team-banner,.nav-section-label,.sidebar-search{display:none}.nav-item{justify-content:center;padding:.55rem}.nav-item .lbl{display:none}.sidebar h1{display:none}}
.dugout-panel h2{font-size:1.05rem;margin-top:0}
.dugout-panel h2:not(:first-child){margin-top:1.25rem}
.sim-btn-row{display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;margin-bottom:.25rem}

function pickRelievers(g,tm,n){
const ids=(tm.bullpen||[]).map(id=>playerById(g,id)).filter(p=>p&&p.pos==='RP');

const closerId=tm.closerId||null;
let others=ids.filter(p=>p.id!==closerId);

others=others.slice().sort(()=>rng()-0.5);
let need=Math.min(n,ids.length);
let out=others.slice(0,closer?Math.max(0,need-1):need);
if(closer&&out.length<n)out.push(closer);
return out.slice(0,n)
}

function buildSchedule(){
const n=30;
const games=[];
const teams=[...Array(n).keys()];
for(let d=0;d<162;d++){
const round=d%29;
let arr=teams.slice();
for(let r=0;r<round;r++)arr=[arr[0],arr[n-1],...arr.slice(1,n-1)];
for(let i=0;i<n/2;i++){
const a=arr[i],b=arr[n-1-i];
const home=d%2===0?a:b;
const away=home===a?b:a;
games.push({home,away,day:d,played:false,result:null,box:null});
}
}
return games
}

function removeFromOrgRoster(t,pid){
t.mlb26=t.mlb26.filter(x=>x!==pid);
['AAA','AA','A'].forEach(l=>{t.minors[l]=t.minors[l].filter(x=>x!==pid)})
}

function addToOrgLevel(t,pid,level){
const arr=level==='MLB'?t.mlb26:t.minors[level];
if(!arr.includes(pid))arr.push(pid)
}

function mlbHitters(g,tm){
return tm.mlb26.map(id=>playerById(g,id)).filter(p=>p&&p.pos!=='SP'&&p.pos!=='RP')
}
function mlbSPs(g,tm){
return tm.mlb26.map(id=>playerById(g,id)).filter(p=>p&&p.pos==='SP')
}
function mlbRPs(g,tm){
return tm.mlb26.map(id=>playerById(g,id)).filter(p=>p&&p.pos==='RP')
}

function ensureTeamStaffing(g,tm){
if(!tm||!g)return;
const hitters=mlbHitters(g,tm);
const hIds=new Set(hitters.map(p=>p.id));
if(!Array.isArray(tm.lineup))tm.lineup=[];
tm.lineup=tm.lineup.filter(id=>hIds.has(id));
for(let i=0;i<hitters.length&&tm.lineup.length<9;i++){
if(!tm.lineup.includes(hitters[i].id))tm.lineup.push(hitters[i].id)
}
tm.lineup=tm.lineup.slice(0,9);
const sps=mlbSPs(g,tm);
const sIds=new Set(sps.map(p=>p.id));
if(!Array.isArray(tm.rotation))tm.rotation=[];
tm.rotation=tm.rotation.filter(id=>sIds.has(id));
for(let i=0;i<sps.length&&tm.rotation.length<5;i++){
if(!tm.rotation.includes(sps[i].id))tm.rotation.push(sps[i].id)
}
tm.rotation=tm.rotation.slice(0,5);
const rps=mlbRPs(g,tm);
const rIds=new Set(rps.map(p=>p.id));
if(!Array.isArray(tm.bullpen))tm.bullpen=[];
tm.bullpen=tm.bullpen.filter(id=>rIds.has(id));
for(let i=0;i<rps.length&&tm.bullpen.length<8;i++){
if(!tm.bullpen.includes(rps[i].id))tm.bullpen.push(rps[i].id)
}
tm.bullpen=tm.bullpen.slice(0,8);
if(tm.closerId!=null&&!rIds.has(tm.closerId))tm.closerId=null;
if(tm.closerId==null&&tm.bullpen.length)tm.closerId=tm.bullpen[tm.bullpen.length-1]
}

function lineupBattersForSim(g,tm){
ensureTeamStaffing(g,tm);
const pool=mlbHitters(g,tm).map(p=>p.id);
const want=tm.lineup||[];
const out=[];
want.forEach(id=>{if(pool.includes(id)&&!out.includes(id))out.push(id)});
pool.forEach(id=>{if(!out.includes(id))out.push(id)});
return out.slice(0,9).map(id=>playerById(g,id)).filter(Boolean)
}

const i=div.findIndex(x=>x.id===tm.id);
return i<0?'ŌĆö':String(i+1)
}

function wlStreak(g,tm){
const played=g.schedule.filter(sg=>sg.played&&(sg.home===tm.id||sg.away===tm.id)).sort((a,b)=>b.day-a.day);
if(!played.length)return'ŌĆö';
const r0=played[0].result;
if(!r0||r0.win==null)return'ŌĆö';
let first=r0.win===tm.id;
let n=0;
for(let i=0;i<played.length;i++){
const rr=played[i].result;
if(!rr||rr.win==null)break;
const w=rr.win===tm.id;
if((w&&first)||(!w&&!first))n++;else break
}
return(first?'W':'L')+n
}

return w+'-'+l
}

/* ŌĆöŌĆöŌĆö SIM ENGINE ŌĆöŌĆöŌĆö */
function pcClamp(x,a,b){return Math.max(a,Math.min(b,x))}
function simPlateAppearance(bat,pit,rand){
const bc=pcClamp((bat.contact||50)/80,0,1),bp=pcClamp((bat.power||50)/80,0,1),bs=pcClamp((bat.speed||50)/80,0,1);
const ps=pcClamp((pit.stuff||50)/80,0,1),pc=pcClamp((pit.control||50)/80,0,1);
let pBB=0.038+(1-pc)*0.058+(bc-0.5)*0.038;
let pSO=0.178+ps*0.11-bc*0.072;
let pHR=0.010+bp*0.036;
let p3B=0.0018+bs*0.009;
let p2B=0.032+bp*0.026;
let p1B=0.092+bc*0.072;
pBB=pcClamp(pBB,0.035,0.155);pSO=pcClamp(pSO,0.10,0.34);pHR=pcClamp(pHR,0.004,0.052);
p3B=pcClamp(p3B,0.001,0.012);p2B=pcClamp(p2B,0.026,0.068);p1B=pcClamp(p1B,0.082,0.18);
let s=pBB+pSO+pHR+p3B+p2B+p1B;
if(s>0.58){const sc=0.58/s;pBB*=sc;pSO*=sc;pHR*=sc;p3B*=sc;p2B*=sc;p1B*=sc}
const r=rand();
let t=0;
if(r<(t+=pBB))return'BB';
if(r<(t+=pSO))return'SO';
if(r<(t+=pHR))return'HR';
if(r<(t+=p3B))return'3B';
if(r<(t+=p2B))return'2B';
if(r<(t+=p1B))return'1B';
return'OUT';
}

function flushPitcherStint(p,rand){
if(!p)return;
const o=p._gOuts|0,r=p._gRuns|0;
p.ip+=o/3;
if(r>0){const er=Math.min(r,Math.max(0,Math.round(r*(0.86+rand()*0.10))));p.er+=er}
p._gOuts=0;p._gRuns=0
}

function simGame(g,homeId,awayId,opts){
opts=opts||{};
const rand=g.rng||Math.random;
const extraHome=opts.pitchIdxHome||0,extraAway=opts.pitchIdxAway||0;
const home=getTeam(g,homeId),away=getTeam(g,awayId);
const homeBatters=lineupBattersForSim(g,home);
const awayBatters=lineupBattersForSim(g,away);
const homeSP=startingPitcherForGame(g,homeId,extraHome)||playerById(g,home.rotation&&home.rotation[0])||homeBatters[0];
const awaySP=startingPitcherForGame(g,awayId,extraAway)||playerById(g,away.rotation&&away.rotation[0])||awayBatters[0];
const relsH=pickRelievers(g,home,5);
const relsA=pickRelievers(g,away,5);
function spOutLimit(sp){
const st=((sp&&sp.stamina)||55)/80;
return 14+Math.floor(rand()*5)+Math.floor(st*5)
}
let homePit=homeSP,awayPit=awaySP;
let homeRelIdx=0,awayRelIdx=0;
let homeStintMax=spOutLimit(homeSP),awayStintMax=spOutLimit(awaySP);
[homeSP,awaySP].forEach(p=>{if(p){p._gOuts=0;p._gRuns=0}});
function doPullHome(){
flushPitcherStint(homePit,rand);
if(homeRelIdx<relsH.length){homePit=relsH[homeRelIdx++];homeStintMax=3+randInt(0,4)}
else{homeStintMax+=8}
if(homePit){homePit._gOuts=0;homePit._gRuns=0}
}
function doPullAway(){
flushPitcherStint(awayPit,rand);
if(awayRelIdx<relsA.length){awayPit=relsA[awayRelIdx++];awayStintMax=3+randInt(0,4)}
else{awayStintMax+=8}
if(awayPit){awayPit._gOuts=0;awayPit._gRuns=0}
}
function ensurePitcher(half){
if(half===0){while(homePit&&homePit._gOuts>=homeStintMax)doPullHome()}
else{while(awayPit&&awayPit._gOuts>=awayStintMax)doPullAway()}
}
function recordOut(half){
if(half===0){homePit._gOuts++;ensurePitcher(0)}
else{awayPit._gOuts++;ensurePitcher(1)}
}
let inn=1,runsH=0,runsA=0,outs=0,half=0;
const lines={home:{r:0,h:0,e:0},away:{r:0,h:0,e:0}};
const maxInn=9;
while(inn<=maxInn||(runsH===runsA)){
if(inn>maxInn+8)break;
let base=[0,0,0];
let runsInHalf=0;
outs=0;
const batSide=half===0?awayBatters:homeBatters;
let bi=0;
while(outs<3){
ensurePitcher(half);
const pit=half===0?homePit:awayPit;
const batter=batSide[bi%batSide.length];
const res=simPlateAppearance(batter,pit,rand);
bi++;
if(res==='BB'){
if(base[0]&&base[1]&&base[2]){runsInHalf++;if(half===0)runsA++;else runsH++;if(half===0)homePit._gRuns++;else awayPit._gRuns++}
else if(base[0]&&base[1]){runsInHalf++;if(half===0)runsA++;else runsH++;if(half===0)homePit._gRuns++;else awayPit._gRuns++}
else if(base[0]&&base[2]){runsInHalf++;if(half===0)runsA++;else runsH++;if(half===0)homePit._gRuns++;else awayPit._gRuns++}
base=[1,base[0],base[1]];
batter.pa++;batter.bb++;pit.pBB++;
continue;
}
if(res==='SO'){
outs++;batter.pa++;batter.so++;pit.k++;
recordOut(half);
continue
}
if(res==='HR'){
const rb=1+(base[0]?1:0)+(base[1]?1:0)+(base[2]?1:0);
runsInHalf+=rb;if(half===0)runsA+=rb;else runsH+=rb;if(half===0)homePit._gRuns+=rb;else awayPit._gRuns+=rb;
batter.pa++;batter.ab++;batter.h++;batter.hr+=1;batter.rbi+=rb;
pit.pH++;
base=[0,0,0];
continue;
}
if(res==='3B'||res==='2B'||res==='1B'){
let adv=res==='1B'?1:res==='2B'?2:3;
let rbi=0;
if(adv===3){rbi=(base[2]?1:0)+(base[1]?1:0)+(base[0]?1:0);base=[0,0,1]}
else if(adv===2){rbi=(base[2]?1:0)+(base[1]?1:0);const n1=base[0]?1:0;base=[0,n1,1]}
else{rbi=(base[2]?1:0);const n2=base[1]?1:0;const n1=base[0]?1:0;base=[n1,n2,1]}
runsInHalf+=rbi;if(half===0)runsA+=rbi;else runsH+=rbi;if(half===0)homePit._gRuns+=rbi;else awayPit._gRuns+=rbi;
batter.pa++;batter.ab++;batter.h++;
pit.pH++;
continue;
}
outs++;
batter.pa++;batter.ab++;
if(rand()<0.07){lines[half===0?'away':'home'].e++}
recordOut(half);
}
half++;
if(half===2){half=0;inn++}
}
flushPitcherStint(homePit,rand);
flushPitcherStint(awayPit,rand);
homeSP.gs++;awaySP.gs++;
if(runsH>runsA){homeSP.w++;awaySP.l++}else{awaySP.w++;homeSP.l++}
if(runsH>runsA&&homeRelIdx>0&&relsH.length&&(runsH-runsA)<=5){
const closer=relsH[relsH.length-1]||relsH[0];
if(closer)closer.sv=(closer.sv||0)+1
}
if(runsA>runsH&&awayRelIdx>0&&relsA.length&&(runsA-runsH)<=5){
const closer=relsA[relsA.length-1]||relsA[0];
if(closer)closer.sv=(closer.sv||0)+1
}
const win=runsH>runsA?homeId:awayId;
const lose=runsH>runsA?awayId:homeId;
return{homeId,awayId,runsH,runsA,win,lose,lines,inn:Math.min(inn,12)}
}

function logLeagueStatSanity(g){
if(!g||!g.players)return;
const hit=g.players.filter(p=>p.level==='MLB'&&p.pos!=='SP'&&p.pos!=='RP'&&(p.ab||0)>=200);
if(!hit.length)return;
let sumH=0,sumAB=0,maxHr=0,hrName='ŌĆö';
hit.forEach(p=>{sumH+=p.h||0;sumAB+=p.ab||0;if((p.hr||0)>maxHr){maxHr=p.hr||0;hrName=p.first+' '+p.last}});
const avg=sumAB?sumH/sumAB:0;
const pit=g.players.filter(p=>p.level==='MLB'&&(p.pos==='SP'||p.pos==='RP')&&(p.ip||0)>=40);
let bestEra=999,bestName='ŌĆö';
pit.forEach(p=>{
const e=parseFloat(era(p));
if(!isNaN(e)&&e<bestEra){bestEra=e;bestName=p.first+' '+p.last}
});
if(__PC_DEBUG)console.log('[PennantChase sanity] League AVG (200+ AB): '+avg.toFixed(3)+' ┬Ę HR leader: '+maxHr+' ('+hrName+') ┬Ę Best ERA (40+ IP): '+(bestEra===999?'ŌĆö':bestEra.toFixed(2))+' ('+bestName+')')
}

function applyGameResult(g,homeId,awayId,res){
const h=getTeam(g,homeId),a=getTeam(g,awayId);
if(!h||!a)return;
if(res.runsH>res.runsA){h.w++;a.l++;h.rs+=res.runsH;h.ra+=res.runsA;a.rs+=res.runsA;a.ra+=res.runsH}
else{a.w++;h.l++;h.rs+=res.runsH;h.ra+=res.runsA;a.rs+=res.runsA;a.ra+=res.runsH}

}

function simDay(g){
if(g.seasonComplete){if(g.inPlayoffs)simPlayoffDay(g);return}
if(g.seasonDay>=162){
const left=g.schedule.filter(x=>!x.played).length;
if(left===0&&!g.seasonComplete)endRegularSeason(g);
return
}
const dayGames=g.schedule.filter(sg=>sg.day===g.seasonDay&&!sg.played);
if(dayGames.length===0){g.seasonDay++;return simDay(g)}
dayGames.forEach(sg=>{
const res=simGame(g,sg.home,sg.away);
sg.played=true;sg.result=res;sg.box=res;
applyGameResult(g,sg.home,sg.away,res);
const hh=getTeam(g,sg.home),aa=getTeam(g,sg.away);
if(hh&&aa)addNews(g,hh.abbr+' '+res.runsH+', '+aa.abbr+' '+res.runsA,'result');

developProspects(g);

if(simUt)simUt.revenue+=0.4+simUt.w*0.01;

const POST_COUNTING_KEYS=['pa','ab','h','hr','rbi','r','sb','bb','so','ip','er','k','w','l','sv','gs','pH','pBB'];
const POST_PS_MAP={pa:'psPA',ab:'psAB',h:'psH',hr:'psHR',rbi:'psRBI',r:'psR',sb:'psSB',bb:'psBB',so:'psSO',ip:'psIP',er:'psER',k:'psK',w:'psW',l:'psL',sv:'psSV',gs:'psGS',pH:'psPH',pBB:'psPBB'};
function snapshotPostCounting(g){
const m={};
g.players.forEach(p=>{
const o={};
POST_COUNTING_KEYS.forEach(k=>{o[k]=Number(p[k])||0});
m[p.id]=o;
});
return m
}
function transferPlayoffGameToPostseason(g,snap){
g.players.forEach(p=>{
const b=snap[p.id];if(!b)return;
POST_COUNTING_KEYS.forEach(k=>{
const ps=POST_PS_MAP[k];
const cur=Number(p[k])||0;
const prev=Number(b[k])||0;
const d=cur-prev;
if(!d)return;
p[ps]=(Number(p[ps])||0)+d;
p[k]=prev;
});
});
}

function simPlayoffDay(g){
const p=g.playoffs;
if(!p||g.playoffsComplete)return;
p.calendarDay=(p.calendarDay||0)+1;
function playoffNeed(s){return Math.ceil(s.best/2)}
let guard=0;
while(p.stage.length&&p.stage.every(s=>s.done)&&p.phase!=='WS'&&guard++<5){
advancePlayoffRound(g)
}
if(p.phase==='WS'&&p.stage.length===1&&p.stage[0].done){
g.playoffsComplete=true;
const tm=getTeam(g,p.stage[0].winner);
addNews(g,'World Series champion: '+(tm?tm.abbr:'ŌĆö'),'general');
return
}
if(!p.stage.length)return;
let pending=p.stage.filter(s=>!s.done);
if(!pending.length&&p.stage.every(s=>s.done)&&p.phase==='WS'){
g.playoffsComplete=true;
const ch=p.stage[0].winner,tm=getTeam(g,ch);
addNews(g,'World Series champion: '+(tm?tm.abbr:'ŌĆö'),'general');
return
}
if(!pending.length)return;
for(const s of pending){
const need=playoffNeed(s);
if(s.hW>=need||s.aW>=need){s.done=true;continue}
const gnum=s.hW+s.aW;
const snap=snapshotPostCounting(g);
const res=simGame(g,s.h,s.a,{pitchIdxHome:gnum,pitchIdxAway:gnum});
transferPlayoffGameToPostseason(g,snap);
if(res.win===s.h)s.hW++;else s.aW++;
const th=getTeam(g,s.h),ta=getTeam(g,s.a);
addNews(g,s.label+': '+th.abbr+' '+res.runsH+' ┬Ę '+res.runsA+' '+ta.abbr+' (series '+s.hW+'-'+s.aW+')','result');
if(s.hW>=need||s.aW>=need){
s.done=true;
s.winner=s.hW>s.aW?s.h:s.a;
const loser=s.hW>s.aW?s.a:s.h;
const tw=getTeam(g,s.winner),tl=getTeam(g,loser);
p.results.push({label:s.label,winner:s.winner,loser:loser,abbr:tw?tw.abbr:'?',loserAbbr:tl?tl.abbr:'?',hW:s.hW,aW:s.aW});
addNews(g,s.label+' ŌĆö '+(tw?tw.abbr:'?')+' wins the series','result');
}
}
if(p.stage.every(s=>s.done)){
if(p.phase==='WS'){
g.playoffsComplete=true;
const ch=p.stage[0].winner,tm=getTeam(g,ch);
addNews(g,'World Series champion: '+(tm?tm.abbr:'ŌĆö'),'general');
}else advancePlayoffRound(g)
}
}

function repairPlayoffsIfNeeded(g){

const al=(g.playoffs.seedsAL||[]).length>=6?g.playoffs.seedsAL:(g.playoffs.bracket&&g.playoffs.bracket.AL);
const nl=(g.playoffs.seedsNL||[]).length>=6?g.playoffs.seedsNL:(g.playoffs.bracket&&g.playoffs.bracket.NL);
if(!al||!nl||al.length<6||nl.length<6){g.inPlayoffs=false;g.playoffs=null;return}
const ac=al.slice(0,6),nc=nl.slice(0,6);
g.playoffs.seedsAL=ac;g.playoffs.seedsNL=nc;g.playoffs.bracket=g.playoffs.bracket||{AL:ac,NL:nc};
if(!g.playoffs.phase)g.playoffs.phase='WC';
g.playoffs.stage=[
{h:ac[2],a:ac[5],hW:0,aW:0,best:1,label:'AL Wild Card ┬Ę 3 vs 6',league:'AL',done:false},

{h:nc[2],a:nc[5],hW:0,aW:0,best:1,label:'NL Wild Card ┬Ę 3 vs 6',league:'NL',done:false},
{h:nc[3],a:nc[4],hW:0,aW:0,best:1,label:'NL Wild Card ┬Ę 4 vs 5',league:'NL',done:false}
];
}

function normalizeGame(g){
if(!g.settings)g.settings={autoSave:true,simSpeed:1,saveName:'My Career'};
if(g.settings.saveName==null)g.settings.saveName='My Career';
if(!g.transactionLog)g.transactionLog=[];
if(g.playoffsComplete==null)g.playoffsComplete=false;
if(g.playoffs&&g.playoffs.queue)delete g.playoffs.queue;
if(!Array.isArray(g.draftScoutedIds))g.draftScoutedIds=[];
if(g.scoutsAvailable==null)g.scoutsAvailable=10;
if(g.draftScoutsTotal==null)g.draftScoutsTotal=10;
repairPlayoffsIfNeeded(g);
const _rngM=g.rng||Math.random;
g.players.forEach(p=>{
if((p.pos==='SP'||p.pos==='RP')&&(p.pH==null))p.pH=0;
if((p.pos==='SP'||p.pos==='RP')&&(p.pBB==null))p.pBB=0;
if(p.pos==='SP'||p.pos==='RP'){if(!p.throws)p.throws=_rngM()<0.3?'L':'R'}
else{if(!p.bats){const r=_rngM();p.bats=r<0.3?'L':(r<0.4?'S':'R')}}
});
if(Array.isArray(g.news))g.news.forEach(n=>{if(!n.type)n.type='general'});
g.teams.forEach(t=>ensureTeamStaffing(g,t));
const psZ=['psPA','psAB','psH','psHR','psRBI','psR','psSB','psBB','psSO','psIP','psER','psK','psW','psL','psSV','psGS','psPH','psPBB'];
g.players.forEach(p=>{psZ.forEach(k=>{if(p[k]==null)p[k]=0})});
g.version=2;
g.userTeamId=+g.userTeamId;
if(!Number.isFinite(g.userTeamId))g.userTeamId=0;
return g
}

function isGamePlayable(g){
if(!g||typeof g!=='object')return false;
if(!Array.isArray(g.teams)||g.teams.length!==30)return false;
if(!Array.isArray(g.players))return false;
if(!Number.isFinite(g.userTeamId)||g.userTeamId<0||g.userTeamId>=30)return false;
if(!Array.isArray(g.schedule)||g.schedule.length<1)return false;
const ut=g.teams[g.userTeamId];
if(!ut||!Array.isArray(ut.mlb26))return false;
return true
}

function avg(p){return p.ab?((p.h/p.ab)*1000|0)/1000:.000}
function era(p){return p.ip?((p.er*9)/(p.ip||0.1)).toFixed(2):'0.00'}
function whip(p){if(!p.ip)return'0.00';const bb=p.pBB!=null?p.pBB:0;const h=p.pH!=null?p.pH:0;return((bb+h)/(p.ip||0.1)).toFixed(2)}
function opsStat(p){if(!p.ab&&!p.pa)return'.000';const obp=(p.h+(p.bb||0))/Math.max(1,p.pa);const slg=(p.h+(p.hr||0)*2.27)/Math.max(1,p.ab);return(obp+slg).toFixed(3)}
function obpStat(p){if(!p.pa)return'.000';return((p.h+(p.bb||0))/Math.max(1,p.pa)).toFixed(3)}
function k9Stat(p){if(!p.ip)return'0.0';return(((p.k||0)*9)/(p.ip||0.1)).toFixed(1)}
function drsStat(p){
if(p.pos==='SP'||p.pos==='RP')return'ŌĆö';
const f=p.field!=null?p.field:50;
const g=Math.max(0,Math.min(162,(p.pa||0)/3.8));
return((f-50)*0.12*Math.min(1,g/120)).toFixed(0)
}
function warStat(p){
if(p.pos==='SP'||p.pos==='RP'){
const ip=+(p.ip||0);if(ip<1)return'0.0';
const erA=parseFloat(era(p))||0;
const runsAbove=Math.max(-1,4.35-erA)*(ip/35);
return(runsAbove*0.08).toFixed(1)
}
const pa=+(p.pa||0);if(pa<10)return'0.0';
const o=parseFloat(opsStat(p))||0;
const runsAbove=(o-0.715)*(pa/650)*48;
return runsAbove.toFixed(1)
}

const st=p.stuff>=60?'Plus stuff':p.stuff>=52?'Average stuff':'Fringe stuff';

return st+', '+ct
}
const pw=p.power>=60?'Plus power':p.power>=50?'solid power':'light power';
const fld=p.field>=58?'strong glove':'workable glove';
return pw+', '+fld
}

const end=Math.min(162,start+per);

cal+=w.map(d=>'<div class="cal-head">'+d+'</div>').join('');
for(let i=0;i<per;i++){

cal+='<div class="cal-cell"></div>';
continue;
}
const sg=byDay[d];
let inner='<span class="dm">'+(d+1)+'</span>';

inner+='<span class="opp">'+(sg.home===ut.id?'vs ':'@ ')+(opp?opp.abbr:'ŌĆö')+'</span>';

function gb(team,leader){
const w=leader.w-team.w,l=team.l-leader.w;
return ((l-w)/2).toFixed(1)
}

function pythExpW(tm){
const gms=tm.w+tm.l;
if(!gms)return'ŌĆö';
const rs=Math.max(1,tm.rs),ra=Math.max(1,tm.ra);
return String(Math.round(gms*rs*rs/(rs*rs+ra*ra)))
}

function renderLeaders(g){
const key=sortState.leaders.key,dir=sortState.leaders.dir;
const abQual=50,ipQual=40;
let hit=allHitters(g).filter(p=>p.ab>=abQual);
let pit=allPitchers(g).filter(p=>p.ip>=ipQual);
if(['avg','hr','rbi','ops','obp','war'].includes(key)){
hit=hit.sort((a,b)=>{
let va,vb;
if(key==='avg'){va=parseFloat(avg(a));vb=parseFloat(avg(b))}
else if(key==='ops'){va=parseFloat(opsStat(a));vb=parseFloat(opsStat(b))}
else if(key==='obp'){va=parseFloat(obpStat(a));vb=parseFloat(obpStat(b))}
else if(key==='war'){va=parseFloat(warStat(a));vb=parseFloat(warStat(b))}
else{va=a[key];vb=b[key]}
return (va-vb)*dir;
});
}else{
pit=pit.sort((a,b)=>{

if(key==='era'){va=parseFloat(era(a));vb=parseFloat(era(b))}

else if(key==='ip'){va=a.ip||0;vb=b.ip||0}
else if(key==='war'){va=parseFloat(warStat(a));vb=parseFloat(warStat(b))}
else{va=a[key];vb=b[key]}
return (va-vb)*dir;
});
}

}

'<div class="finance-payroll-bars"><h3 style="font-size:.88rem;margin:0 0 .5rem;color:var(--gold)">Top salaries (26-man)</h3>'+(barRows||'<p class="sub">No contracts.</p>')+'</div>'+
'<p class="sub" style="margin-top:1rem"><strong>Cap room</strong> vs operating budget: <strong>$'+capRem.toFixed(1)+'M</strong> under your budget ceiling (budget ŌłÆ payroll).</p>'+

}));

if(slotTeam!==g.userTeamId){toast('Not your pick.','error');return}
const pool=g.draftProspects.filter(p=>p.level==='DRAFT');if(!pool.length)return;

});

function draftSelect(pid){
const order=game.draftOrder||[];
const cur=order[game.draftPick%30];
const slotTeam=(cur===null||cur===undefined)?-1:cur;
if(slotTeam!==game.userTeamId){toast('Not your pick.','error');return}
const p=playerById(game,pid),ut=userTeam(game);
if(!p||p.level!=='DRAFT'||!ut)return;
p.teamId=ut.id;p.level='A';ut.minors.A.push(p.id);
game.draftProspects=game.draftProspects.filter(x=>x.id!==p.id);
if(game.draftScoutedIds)game.draftScoutedIds=game.draftScoutedIds.filter(x=>x!==pid);
game.draftPick++;
if(game.draftPick%30===0)game.draftRound++;
addNews(game,'Drafted '+p.first+' '+p.last,'draft');logTransaction(game,'Drafted '+p.first+' '+p.last,'draft');saveGame(game);renderMain();toast('Draft pick: '+p.first+' '+p.last+'.','success');
}

function applyTradeFilter(inpId,poolId){

function updateTradeChips(){

document.querySelectorAll(prefix+' .trade-pcard.selected').forEach(c=>{

};

addNews(game,'Trade with '+ot.abbr,'trade');logTransaction(game,'Trade completed with '+ot.abbr,'trade');saveGame(game);toast('Trade accepted.','success');renderMain()
};
updateTradeMeter();updateTradeChips()
}

function newsCatIcon(ty){
const m={general:'­¤ōī',trade:'­¤öĘ',injury:'­¤®╣',signing:'Ō£ģ',draft:'­¤Ä»',result:'ŌÜŠ'};
return m[ty]||'­¤ōŗ'
}
function newsRelativeNote(n,g){
const d=n.day!=null?n.day:0;
const anchor=!g.seasonComplete?g.seasonDay:(g.seasonComplete&&!g.playoffsComplete?200:250);
const diff=Math.max(0,anchor-d);
if(diff===0)return'┬Ę same tick';
if(diff===1)return'┬Ę 1d back';
return'┬Ę '+diff+'d back'
}
function renderNews(g){
const list=g.news||[];
let filtered=newsFilterCat==='all'?list.slice():list.filter(n=>(n.type||'general')===newsFilterCat);
if(newsSearchQuery.trim()){
const q=newsSearchQuery.trim().toLowerCase();
filtered=filtered.filter(n=>String(n.text).toLowerCase().includes(q))
}
const show=filtered.slice(0,newsShowCount);
const byDay={};
show.forEach(n=>{
const d=n.day!=null?n.day:0;
if(!byDay[d])byDay[d]=[];
byDay[d].push(n)
});
const days=Object.keys(byDay).sort((a,b)=>+b-+a);
const cats=[{id:'all',lab:'All'},{id:'general',lab:'General'},{id:'trade',lab:'Trades'},{id:'injury',lab:'Injuries'},{id:'signing',lab:'Signings'},{id:'draft',lab:'Draft'},{id:'result',lab:'Scores'}];
let html='<div class="panel news-page"><h2>News log</h2><p class="sub">'+filtered.length+' item'+(filtered.length!==1?'s':'')+((newsFilterCat!=='all'||newsSearchQuery.trim())?' (filtered)':'')+'</p><input type="search" class="news-search" id="news-search" placeholder="Search headlinesŌĆ”" value="'+esc(newsSearchQuery)+'"/><div class="news-filters">';
cats.forEach(c=>{
html+='<button type="button" class="news-filter-btn'+(newsFilterCat===c.id?' on':'')+'" data-nf="'+c.id+'">'+esc(c.lab)+'</button>'
});
html+='</div><div class="news-timeline">';
days.forEach(day=>{
const items=byDay[day],dn=+day+1;
html+='<details class="news-day-group" open><summary class="news-day-head">Day '+dn+' <span class="sub">('+items.length+')</span></summary>';
items.forEach(n=>{
const ty=n.type||'general';
const rel=newsRelativeNote(n,g);
html+='<div class="news-item-v2"><span class="news-cat news-cat-'+ty+'"><span class="news-cat-ico">'+newsCatIcon(ty)+'</span>'+esc(ty)+'</span><span class="sub" style="float:right;font-size:.72rem">'+esc(rel)+'</span> '+esc(n.text)+'</div>'
});
html+='</details>'
});
html+='</div>';
if(filtered.length>newsShowCount)html+='<button type="button" class="btn secondary" id="news-load-more">Load more ('+(filtered.length-newsShowCount)+' left)</button>';
if(!show.length)html+='<p class="empty">No news matches this filter.</p>';
html+='</div>';
return html
}

function brAbbr(g,id){const t=getTeam(g,id);return t?t.abbr:'ŌĆö'}
function brSeriesSlot(g,s){
if(!s)return'<div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div></div>';
const need=Math.ceil((s.best||1)/2),done=!!s.done,w=s.winner;
function row(tid,wins){
const ab=esc(brAbbr(g,tid));
let cls='row';
if(done&&w!=null){cls+= tid===w?' won':' lost'}
return'<div class="'+cls+'"><span class="abbr">'+ab+'</span><span class="scr">'+(tid!=null&&(wins||done)?String(wins||0):'')+'</span></div>'
}
return'<div class="bracket-slot">'+row(s.h,s.hW)+row(s.a,s.aW)+'</div>'
}
function brFinishedShort(g,idA,idB,winner,best){
const need=Math.ceil(best/2),ha=idA,aa=idB,done=true,w=winner;
const hW=w===ha?need:0,aW=w===aa?need:0;
return brSeriesSlot(g,{h:ha,a:aa,hW,aW,best,done,winner:w})
}
function brTwoSeedPreview(g,a,b){
return brSeriesSlot(g,{h:a,a:b,hW:0,aW:0,best:1,done:false,winner:null})
}
function brFindResW(p,frag){
const r=(p.results||[]).find(x=>x.label&&x.label.includes(frag));
return r&&r.winner!=null?r.winner:null
}
function brResAbbr(r,g){return r&&(r.abbr||(g?brAbbr(g,r.winner):''))||'ŌĆö'}
function brWonSeriesCard(ab){
return'<div class="bracket-slot"><div class="row won"><span class="abbr">'+esc(ab)+'</span><span class="scr">Ō£ō</span></div></div>'
}
function brStageBy(p,pred){return(p.stage||[]).filter(pred)}
function brDsPlaceholder(g,seeds,seedIdx,wCWinnerId){
return'<div class="bracket-slot tbd"><div class="row"><span class="abbr">'+esc(brAbbr(g,seeds[seedIdx]))+'</span><span class="scr">'+(seedIdx+1)+'</span></div><div class="row"><span class="abbr">'+(wCWinnerId!=null?esc(brAbbr(g,wCWinnerId)):'TBD')+'</span></div></div>'
}
function brLeagueRounds(g,p,lg,preview){
const seeds=preview?sortTeamsByRecord(g,g.teams.filter(t=>t.lg===lg)).slice(0,6).map(t=>t.id):(lg==='AL'?p.seedsAL:p.seedsNL);
if(!seeds||seeds.length<6)return'<div class="bracket-round"><h5>'+lg+'</h5><div class="bracket-slot tbd">ŌĆö</div></div>';
const phase=preview?null:p.phase;
let wcSlots=[];
if(preview||!p){
wcSlots=[brTwoSeedPreview(g,seeds[2],seeds[5]),brTwoSeedPreview(g,seeds[3],seeds[4])]
}else{
const liveWc=brStageBy(p,s=>s.league===lg&&s.label&&s.label.indexOf('Wild Card')>=0);
if(phase==='WC'&&liveWc.length>=2){
const a=liveWc.find(s=>s.label.indexOf('3 vs')>=0)||liveWc[0],b=liveWc.find(s=>s.label.indexOf('4 vs')>=0)||liveWc[1];
wcSlots=[brSeriesSlot(g,a),brSeriesSlot(g,b)]
}else{
const w36=brFindResW(p,lg+' Wild Card ┬Ę 3 vs'),w45=brFindResW(p,lg+' Wild Card ┬Ę 4 vs');
if(w36!=null&&w45!=null)wcSlots=[brFinishedShort(g,seeds[2],seeds[5],w36,1),brFinishedShort(g,seeds[3],seeds[4],w45,1)];
else wcSlots=[brTwoSeedPreview(g,seeds[2],seeds[5]),brTwoSeedPreview(g,seeds[3],seeds[4])]
}
}
let dsSlots=[];
if(preview||!p){
dsSlots=[brDsPlaceholder(g,seeds,0,null),brDsPlaceholder(g,seeds,1,null)]
}else{
const dsPrefix=lg==='AL'?'ALDS':'NLDS';
let dsLive=brStageBy(p,s=>s.league===lg&&s.label&&s.label.startsWith(dsPrefix));
if(dsLive.length<2&&p.phase==='DS')dsLive=brStageBy(p,s=>s.league===lg&&s.best===5);
const resDs=(p.results||[]).filter(r=>r.label&&r.label.startsWith(dsPrefix));
if(dsLive.length>=2)dsSlots=dsLive.slice(0,2).map(s=>brSeriesSlot(g,s));
else if(resDs.length>=2)dsSlots=resDs.slice(0,2).map(r=>brWonSeriesCard(brResAbbr(r,g)));
else{
const w45=brFindResW(p,lg+' Wild Card ┬Ę 4 vs'),w36=brFindResW(p,lg+' Wild Card ┬Ę 3 vs');
dsSlots=[brDsPlaceholder(g,seeds,0,w45),brDsPlaceholder(g,seeds,1,w36)]
}
}
if(dsSlots.length<2)dsSlots=[
'<div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div></div>',
'<div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div></div>'
];
const lcsLive=!preview&&p?brStageBy(p,s=>s.league===lg&&(s.label==='ALCS'||s.label==='NLCS')):[];
let lcsSlot;
if(preview||!p)lcsSlot='<div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div><div class="row"><span class="abbr">TBD</span></div></div>';
else if(lcsLive.length===1)lcsSlot=brSeriesSlot(g,lcsLive[0]);
else{
const lcsW=brFindResW(p,lg==='AL'?'ALCS':'NLCS');
lcsSlot=lcsW!=null?brWonSeriesCard(brAbbr(g,lcsW)):'<div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div><div class="row"><span class="abbr">TBD</span></div></div>'
}
function col(title,inner){
return'<div class="bracket-round"><h5>'+esc(title)+'</h5>'+inner+'</div>'
}
return col(lg+' WC',wcSlots.join(''))+col(lg+' LDS',dsSlots.join(''))+col(lg+' LCS',lcsSlot)
}
function brWsSlot(g,p,preview){
if(preview||!p)return'<div class="bracket-round"><h5>World Series</h5><div class="bracket-slot tbd"><div class="row"><span class="abbr">AL</span></div><div class="row"><span class="abbr">NL</span></div></div></div>';
const ws=brStageBy(p,s=>s.league==='WS'||s.label==='World Series');
if(ws.length===1)return'<div class="bracket-round"><h5>World Series</h5>'+brSeriesSlot(g,ws[0])+'</div>';
const ch=brFindResW(p,'World Series');
if(ch!=null){const tm=getTeam(g,ch);return'<div class="bracket-round"><h5>World Series</h5><div class="bracket-slot"><div class="row won"><span class="abbr">'+(tm?esc(tm.abbr):'?')+'</span><span class="scr">­¤Åå</span></div></div></div>'}
return'<div class="bracket-round"><h5>World Series</h5><div class="bracket-slot tbd"><div class="row"><span class="abbr">TBD</span></div><div class="row"><span class="abbr">TBD</span></div></div></div>'
}
function renderBracketShelf(g,p){
const preview=!g.seasonComplete||!p;
const al=brLeagueRounds(g,p,'AL',preview);
const nl=brLeagueRounds(g,p,'NL',preview);
const ws=brWsSlot(g,p,preview);
return'<div class="bracket-shelf"><div class="bracket-half al">'+al+'</div><div class="bracket-ws">'+ws+'</div><div class="bracket-half nl">'+nl+'</div></div>'
}

function playoffSeedRows(g,lg,utid){
return sortTeamsByRecord(g,g.teams.filter(t=>t.lg===lg)).slice(0,6).map((t,i)=>'<div class="po-seed'+(t.id===utid?' user':'')+'"><span class="n">'+(i+1)+'</span><span>'+esc(t.abbr)+'</span><span style="opacity:.65;margin-left:auto">'+(t.w)+'ŌĆō'+(t.l)+'</span></div>').join('');
}

if(!g.seasonComplete){

const seedNl=(p.seedsNL||[]).map((id,i)=>{const tm=getTeam(g,id);return'<div class="po-seed'+(id===utid?' user':'')+'"><span class="n">'+(i+1)+'</span>'+(tm?esc(tm.abbr):'?')+'</div>'}).join('');
function resLine(r){
const wAb=esc(r.abbr||(getTeam(g,r.winner)||{abbr:'?'}).abbr);
const lAb=esc(r.loserAbbr||((r.loser!=null?getTeam(g,r.loser):null)||{abbr:'?'}).abbr);

}
const results=(p.results||[]).slice().reverse().slice(0,14).map(resLine).join('');
return'<div class="panel"><h2>October bracket</h2><p class="sub">'+(g.playoffsComplete?'Final tree for '+g.seasonYear+'.':'Wild Card ŌåÆ LDS (best-of-5) ŌåÆ LCS (best-of-7) ŌåÆ World Series.')+'</p>'+banner+
(!g.playoffsComplete?'<p><button type="button" class="btn lg" id="simp-play"'+btnDis+'>Sim postseason day</button> ': '')+
(!g.playoffsComplete?'<span class="sub">Or use Home ŌåÆ <strong>Sim day</strong> during October (same action).</span></p>':'')+
renderBracketShelf(g,p)+
'<h3 style="font-size:.88rem;margin:1rem 0 .5rem;color:var(--gold)">Seeds (locked)</h3><div class="po-bracket"><div class="po-col"><h4>AL seeds</h4>'+seedAl+'</div><div class="po-col"><h4>NL seeds</h4>'+seedNl+'</div></div>'+
'<h3 style="font-size:.95rem;margin-top:1.25rem;color:var(--gold)">Results log</h3><ul style="font-size:.84rem;line-height:1.65;margin:0;padding-left:1.1rem">'+(results||'<li class="sub">No series finished yet.</li>')+'</ul></div>'
}

function bindSettings(){
var ng=document.getElementById('newgame');if(ng)ng.addEventListener('click',()=>{
showModal('<h3>Start a new career?</h3><p class="sub">Your current save in this browser will be deleted.</p><p><button class="btn" id="ng-y">Start fresh</button> <button class="btn secondary" id="ng-n">Cancel</button></p>');
document.getElementById('ng-y').onclick=()=>{hideModal();try{localStorage.removeItem(SAVE_KEY)}catch(e){}game=null;document.getElementById('app').classList.add('hidden');document.getElementById('onboarding').classList.remove('hidden');onboardingStep=1;onboardingTeamIdx=0;onboardingDiff=1;renderOnboarding()};
document.getElementById('ng-n').onclick=hideModal;
});
var sv=document.getElementById('save');if(sv)sv.addEventListener('click',()=>{saveGame(game);toast('Career saved.','success')});
var sn=document.getElementById('savename');if(sn)sn.addEventListener('change',e=>{if(game&&game.settings){game.settings.saveName=e.target.value;saveGame(game);toast('Career name updated.','info')}});
var ld=document.getElementById('load');if(ld)ld.addEventListener('click',()=>{
const x=loadGame();if(x){game=x;game.rng=makeRng(game.seed||Date.now()%1e6);showAppShell();renderNav();renderMain();toast('Loaded save.','success')}else toast('No save file found.','error')
});
var df=document.getElementById('diff');if(df)df.addEventListener('change',e=>{if(game)game.difficulty=+e.target.value;saveGame(game)});
var as=document.getElementById('autosave-toggle');if(as)as.addEventListener('change',()=>{if(game&&game.settings){game.settings.autoSave=!!as.checked;saveGame(game);toast('Auto-save '+(as.checked?'on':'off')+'.','info')}});
var ss=document.getElementById('simspeed');if(ss)ss.addEventListener('change',()=>{if(game&&game.settings){game.settings.simSpeed=+ss.value;saveGame(game);toast('Pacing preference saved.','info')}});
var ex=document.getElementById('export-save');if(ex)ex.addEventListener('click',()=>{
if(!game)return;
try{
const blob=new Blob([JSON.stringify(game)],{type:'application/json'});
const url=URL.createObjectURL(blob);
const a=document.createElement('a');
a.href=url;
a.download='pennant-chase-'+(String((game.settings&&game.settings.saveName)||'career').replace(/[^\w\-]+/g,'-'))+'.json';
a.click();
URL.revokeObjectURL(url);
toast('Download started.','success')
}catch(err){toast('Export failed.','error')}
});
var im=document.getElementById('import-save');if(im)im.addEventListener('change',e=>{
const f=e.target.files&&e.target.files[0];if(!f)return;
const r=new FileReader();
r.onload=()=>{try{
const o=JSON.parse(String(r.result||''));
normalizeGame(o);
if(!isGamePlayable(o)){toast('Invalid or incompatible save file.','error');return}
game=o;game.rng=makeRng(game.seed||Date.now()%1e6);saveGame(game);showAppShell();renderNav();renderMain();toast('Imported career loaded.','success')
}catch(err){toast('Could not read that file.','error')}
};
r.readAsText(f);
im.value=''
})
}

if(uiSection!=='home')return;
if(e.key==='d'||e.key==='D'){e.preventDefault();if(!game||game.playoffsComplete)return;simDay(game);renderMain()}
if(e.key==='w'||e.key==='W'){e.preventDefault();simWeekConfirm()}
})
}

function bindPlayerSearch(){
if(window.__pcBindSearch)return;
const inp=document.getElementById('player-search');if(!inp)return;
window.__pcBindSearch=true;
inp.addEventListener('keydown',e=>{
if(e.key!=='Enter'||!game)return;
const q=inp.value.trim().toLowerCase();if(q.length<2){toast('Type at least 2 characters.','error');return}
const matches=game.players.filter(p=>(p.first+' '+p.last).toLowerCase().includes(q)).slice(0,18);
if(!matches.length){toast('No players matched.','error');return}
const body=matches.map(p=>{var tm=getTeam(game,p.teamId);return'<tr><td>'+esc(p.first+' '+p.last)+'</td><td>'+(tm?tm.abbr:'FA')+'</td><td>'+p.level+'</td><td>'+p.pos+'</td></tr>'}).join('');
showModal('<h3>Player search</h3><table><thead><tr><th>Player</th><th>Team</th><th>Lvl</th><th>Pos</th></tr></thead><tbody>'+body+'</tbody></table><p><button class="btn secondary" id="sr-x">Close</button></p>');
document.getElementById('sr-x').onclick=hideModal;
})
}

function init(){
const ob=document.getElementById('onboarding'),app=document.getElementById('app');
if(!ob||!app){
console.error('Pennant Chase: missing #onboarding or #app');
return
}
let badSave=false;
try{
let raw=null;
try{raw=localStorage.getItem(SAVE_KEY)||localStorage.getItem(LEGACY_SAVE_KEY)}catch(e){}
const saved=loadGame();
if(raw&&!saved)badSave=true;
if(saved){
game=saved;game.rng=makeRng(game.seed||Date.now()%1e6);normalizeGame(game);
ob.removeAttribute('data-pennant-needs-init');showAppShell();renderNav();renderMain()
}else{
app.classList.add('hidden');ob.classList.remove('hidden');onboardingStep=1;onboardingTeamIdx=0;onboardingDiff=1;
if(document.getElementById('ob-s1')&&ob.getAttribute('data-pennant-needs-init')==='1'){wireOnboardingSplashIfNeeded(ob)}
else{renderOnboarding()}
}
}catch(err){
console.error(err);
try{localStorage.removeItem(SAVE_KEY)}catch(e){}
game=null;
app.classList.add('hidden');
ob.classList.remove('hidden');
ob.removeAttribute('data-pennant-needs-init');
onboardingStep=1;onboardingTeamIdx=0;onboardingDiff=1;
renderOnboarding();
}
bindGlobalKeys();bindPlayerSearch();
const bg=document.getElementById('modal-bg');
if(bg&&!bg.dataset.pennantPatched){bg.dataset.pennantPatched='1';bg.addEventListener('click',e=>{if(e.target===bg)hideModal()})}
if(badSave)setTimeout(()=>toast('Saved career could not be loaded (damaged or outdated). Starting fresh.','error'),0)
}
function showBootFailure(err){
console.error(err);
var ob=document.getElementById('onboarding');
if(!ob)return;
ob.removeAttribute('data-pennant-needs-init');
var msg=err&&err.message?err.message:String(err);
ob.innerHTML='<div class="onboarding-inner"><h1>Pennant Chase</h1><p class="sub">The game hit an error while starting.</p><p style="color:#f87171;font-size:.85rem;word-break:break-word">'+esc(msg)+'</p><p><button type="button" class="btn" onclick="location.reload()">Reload page</button></p></div>'
}
function boot(){
try{
init()
}catch(err){
showBootFailure(err)
}
}
if(document.readyState==='loading'){
document.addEventListener('DOMContentLoaded',boot)
}else{
boot()
}
setTimeout(function(){
var ob=document.getElementById('onboarding');
if(ob&&ob.getAttribute('data-pennant-needs-init')==='1'){
console.warn('Pennant Chase: delayed boot retry');
try{init()}catch(err2){showBootFailure(err2)}
}
},500);
})();
</script>
</body>
</html>
